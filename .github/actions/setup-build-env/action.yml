name: 'Setup build environment'
description: >-
  Shared bootstrap for CI jobs: direnv-loaded .envrc, optional GHCR login,
  Node.js with the GitHub Packages registry, yarn auth, and the Turbo/Yarn
  cache. Extracted to remove the setup block that was duplicated across ~8 jobs.
  The caller must run actions/checkout BEFORE this action — a local composite
  action cannot check out the repo it is loaded from.

inputs:
  node-auth-token:
    description: Token for the @midnight-ntwrk GitHub Packages registry (npm auth).
    required: true
  docker-login:
    description: "Set 'true' to log in to ghcr.io (build/e2e jobs that pull images)."
    required: false
    default: 'false'
  docker-password:
    description: Password for the ghcr.io login (only read when docker-login is 'true').
    required: false
    default: ''
  cache-key-prefix:
    description: "Prefix for the Turbo/Yarn cache key ('turbo' for packages, 'turbo-testkit' for testkit)."
    required: false
    default: 'turbo'
  testkit-docker-env:
    description: Value exported as TESTKIT_DOCKER_ENV before loading .envrc (empty falls back to the .envrc default).
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install direnv
      uses: ./.github/actions/install-direnv

    - name: Load environment from .envrc
      shell: bash
      env:
        TESTKIT_DOCKER_ENV: ${{ inputs.testkit-docker-env }}
      run: |
        direnv allow .
        direnv export gha >> "$GITHUB_ENV"

    - name: Log in to GitHub Container registry
      if: inputs.docker-login == 'true'
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
      with:
        registry: 'https://ghcr.io'
        username: MidnightCI
        password: ${{ inputs.docker-password }}

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
      with:
        registry-url: https://npm.pkg.github.com/
        scope: '@midnight-ntwrk'
        node-version-file: '.nvmrc'
        cache: 'yarn'
      env:
        NODE_AUTH_TOKEN: ${{ inputs.node-auth-token }}

    - name: Configure yarn
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ inputs.node-auth-token }}
      run: yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "$NODE_AUTH_TOKEN"

    - name: Cache Turbo and Yarn dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
      with:
        path: |
          **/node_modules
          ~/.yarn
          .turbo
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/turbo.json') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-
