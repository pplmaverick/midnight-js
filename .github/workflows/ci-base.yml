name: Continuous Integration
env:
  MIDNIGHTCI_PACKAGES_WRITE: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

permissions:
  contents: read
  issues: read
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      yarn_filter:
        type: string
        description: Optional filter to include when running Yarn (i.e., --filter=...)
        required: false
        default: ''
      yarn_lint_paths:
        type: string
        description: Optional paths to include when running 'yarn lint'' (i.e., ./packages)
        required: false
        default: ''

jobs:
  ci:
    name: Build, Lint and Unit/Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          node-auth-token: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          docker-login: 'true'
          docker-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Install dependencies
        run: |
          yarn install --immutable

      - name: Run build
        run: yarn build ${{ inputs.yarn_filter }} --cache-dir ./turbo
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run linter
        if: ${{ inputs.yarn_lint_paths != '' }}
        run: yarn lint -- ${{ inputs.yarn_lint_paths }}

      - name: Check dependency constraints
        run: yarn constraints

      - name: Run tests
        run: |
          yarn test ${{ inputs.yarn_filter }} --concurrency 1 --cache-dir ./turbo
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Integration tests
        if: ${{ !contains(github.event.head_commit.message, '[skip_it]') }}
        run: |
          yarn it ${{ inputs.yarn_filter }} --concurrency 1 --cache-dir ./turbo
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Aggregate coverage reports
        run: |
          mkdir -p .nyc_output
          # Copy each coverage-final.json under a unique name so `nyc merge` sees
          # every package — identical basenames would otherwise overwrite one
          # another, leaving a misleading single-package report.
          i=0
          find . -type f -name 'coverage-final.json' -not -path '*/node_modules/*' | while IFS= read -r f; do
            cp "$f" ".nyc_output/coverage-$i.json"
            i=$((i + 1))
          done
          npx --yes nyc merge .nyc_output coverage.json
          npx --yes nyc report --reporter=html --report-dir=coverage --temp-dir=.nyc_output
          rm -rf .nyc_output

      - name: Merge report as ZIP
        run: |
          #ArtiomTr/jest-coverage-report-action@v2 has a bug, this is temp solution
          mv coverage coverage_$(date +"%Y%m%d%H%M%S")
          zip -r coverage.zip coverage*

      - name: Upload Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: Coverage Report
          path: coverage.zip

      - name: Publish Test Coverage
        uses: MishaKav/jest-coverage-comment@25f2818fee93043532f640ad32a7565b4bd4ea9a # ratchet:MishaKav/jest-coverage-comment@v1.0.34
        with:
          hide-comment: false
          unique-id-for-comment: 'midnightjs-coverage'
          multiple-files: |
            contracts, ./packages/contracts/coverage/coverage-summary.json
            dapp-connector-proof-provider, ./packages/dapp-connector-proof-provider/coverage/coverage-summary.json
            fetch-zk-config-provider, ./packages/fetch-zk-config-provider/coverage/coverage-summary.json
            http-client-proof-provider, ./packages/http-client-proof-provider/coverage/coverage-summary.json
            indexer-public-data-provider, ./packages/indexer-public-data-provider/coverage/coverage-summary.json
            level-private-state-provider, ./packages/level-private-state-provider/coverage/coverage-summary.json
            logger-provider, ./packages/logger-provider/coverage/coverage-summary.json
            midnight-js, ./packages/midnight-js/coverage/coverage-summary.json
            node-zk-config-provider, ./packages/node-zk-config-provider/coverage/coverage-summary.json
            utils, ./packages/utils/coverage/coverage-summary.json

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # ratchet:mikepenz/action-junit-report@v6.4.2
        if: success() || failure()
        with:
          check_name: 'Unit Test Results (MidnightJS)'
          report_paths: |
            **/test-report*.xml

      - name: Publish Test Summary Comment
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # ratchet:EnricoMi/publish-unit-test-result-action@v2.24.0
        if: success() || failure()
        with:
          check_name: 'Unit Test Results - MidnightJS'
          files: |
            **/test-report*.xml

      - name: Upload dist for it
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: midnight-js-dist
          path: packages/*/dist/

  docs_api:
    name: Generate API Documentation
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    steps:

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          node-auth-token: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          docker-login: 'true'
          docker-password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          name: midnight-js-dist
          path: packages/

      - name: Generate documentation
        run: yarn run build:markdown-docs
