name: Nightly E2E

# Runs the testkit-js e2e suite nightly against the local docker stack,
# rotating the docker image version set (TESTKIT_DOCKER_ENV) across all five
# environments defined in testkit-js/env/. MN_TEST_ENVIRONMENT stays at
# 'undeployed' for every matrix entry — we are not testing against live
# networks here, only verifying the suite works against each image-version
# combination.
#
# Build runs once (source is identical across envs); e2e fans out per env
# and consumes the shared dist artifacts.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  id-token: write
  packages: write
  checks: write
  pull-requests: write

concurrency:
  group: nightly-e2e
  cancel-in-progress: false

jobs:
  build:
    name: build
    uses: ./.github/workflows/ci-testkit-js-build.yml
    with:
      should_run: 'true'
      testkit_docker_env: 'preview'
    secrets: inherit

  e2e:
    name: e2e (${{ matrix.image_versions }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image_versions: [qanet, preview, preprod, mainnet, devnet]
    uses: ./.github/workflows/ci-testkit-js-e2e.yml
    with:
      test_files: ${{ needs.build.outputs.test-files }}
      testkit_docker_env: ${{ matrix.image_versions }}
      network: 'undeployed'
    secrets: inherit

  summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Download CTRF summaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          pattern: test-results-ctrf-summary-*
          path: ctrf-by-env

      - name: Render cross-env summary
        env:
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          set -euo pipefail
          ARGS=()
          CRASHED=0
          for env in qanet preview preprod mainnet devnet; do
            artifact_dir="ctrf-by-env/test-results-ctrf-summary-${env}"
            # No artifact dir = the e2e job for this env crashed before uploading.
            # Distinguish from "artifact present but no CTRF inside" (empty test run).
            if [ ! -d "$artifact_dir" ]; then
              ARGS+=("$env" "")
              CRASHED=$((CRASHED + 1))
              continue
            fi
            ctrf=$(find "$artifact_dir" -name "ctrf-*.json" 2>/dev/null | head -n1 || true)
            ARGS+=("$env" "${ctrf:-}")
          done
          {
            echo "## Nightly E2E — all environments"
            echo ""
            ./.github/scripts/render-e2e-summary.sh "${ARGS[@]}"
            echo ""
            echo "_Reports per environment available as run artifacts._"
            if [ "$CRASHED" -gt 0 ]; then
              echo ""
              echo ":rotating_light: **${CRASHED} env(s) produced no artifact** — the e2e job crashed before tests ran."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          # Fail the summary job (and therefore the nightly workflow) on any non-success,
          # so reviewers do not have to read the e2e job result to know nightly is broken.
          if [ "$CRASHED" -gt 0 ] || [ "$E2E_RESULT" != "success" ]; then
            echo "::error::Nightly e2e: crashed_envs=${CRASHED} e2e.result=${E2E_RESULT}"
            exit 1
          fi
