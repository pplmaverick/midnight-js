name: Nightly E2E

# Runs the testkit-js e2e suite nightly against the local docker stack,
# rotating the docker image version set (TESTKIT_DOCKER_ENV) across all five
# environments defined in testkit-js/env/. MN_TEST_ENVIRONMENT stays at
# 'undeployed' for every matrix entry — we are not testing against live
# networks here, only verifying the suite works against each image-version
# combination.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  id-token: write
  packages: write
  checks: write
  pull-requests: write

concurrency:
  group: nightly-e2e
  cancel-in-progress: false

jobs:
  e2e:
    name: e2e (${{ matrix.image_versions }})
    strategy:
      fail-fast: false
      matrix:
        image_versions: [qanet, preview, preprod, mainnet, devnet]
    uses: ./.github/workflows/ci-testkit-js.yml
    with:
      should_run: 'true'
      should_prerelease: 'false'
      network: 'undeployed'
      testkit_docker_env: ${{ matrix.image_versions }}
    secrets: inherit

  summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Download CTRF summaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          pattern: test-results-ctrf-summary-*
          path: ctrf-by-env

      - name: Render cross-env summary
        run: |
          ARGS=()
          for env in qanet preview preprod mainnet devnet; do
            ctrf=$(find "ctrf-by-env/test-results-ctrf-summary-${env}" -name "ctrf-*.json" 2>/dev/null | head -n1 || true)
            ARGS+=("$env" "${ctrf:-}")
          done
          {
            echo "## Nightly E2E — all environments"
            echo ""
            ./.github/scripts/render-e2e-summary.sh "${ARGS[@]}"
            echo ""
            echo "_Reports per environment available as run artifacts._"
          } >> "$GITHUB_STEP_SUMMARY"
