name: CI - TestKit.js

permissions:
  actions: read
  contents: read
  issues: read
  id-token: write
  packages: write
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      should_run:
        required: true
        type: string
      should_prerelease:
        required: true
        type: string
      yarn_filter:
        type: string
        description: Optional filter to include when running Yarn (i.e., --filter=...)
        required: false
        default: '--filter="./testkit-js/*"'
      yarn_lint_paths:
        type: string
        description: Optional paths to include when running 'yarn lint'' (i.e., ./packages)
        required: false
        default: './testkit-js'
      build_timeout:
        required: false
        type: number
        default: 30
      network:
        type: string
        description: Midnight network to use (testnet/devnet/undeployed)
        required: true
        default: 'undeployed'
      testkit_docker_env:
        type: string
        description: Docker image version set sourced from testkit-js/env/<testkit_docker_env>.env (qanet|preview|preprod|mainnet|devnet). Empty falls back to the .envrc default (devnet).
        required: false
        default: 'devnet'
      compactc_source:
        type: string
        description: 'compactc source: "release" (default prebuilt download) or "submodule" (build from compact/ submodule via nix).'
        required: false
        default: 'release'

concurrency:
  group: TK-JS-${{ github.workflow }}-${{ inputs.testkit_docker_env || 'default' }}-${{ github.event.pull_request.number || github.ref }}
  # Only cancel superseded PR runs; queue push-to-main runs so a mid-flight
  # release (gated on this workflow in ci.yml) is never cancelled half-done.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    uses: ./.github/workflows/ci-testkit-js-build.yml
    with:
      should_run: ${{ inputs.should_run }}
      yarn_filter: ${{ inputs.yarn_filter }}
      yarn_lint_paths: ${{ inputs.yarn_lint_paths }}
      testkit_docker_env: ${{ inputs.testkit_docker_env }}
      compactc_source: ${{ inputs.compactc_source }}
    secrets: inherit

  prerelease:
    needs: build
    if: inputs.should_run == 'true' && inputs.should_prerelease == 'true'
    uses: ./.github/workflows/ci-testkit-js-prerelease.yml
    with:
      testkit_docker_env: ${{ inputs.testkit_docker_env }}
    secrets: inherit

  e2e:
    needs: build
    if: inputs.should_run == 'true'
    uses: ./.github/workflows/ci-testkit-js-e2e.yml
    with:
      test_files: ${{ needs.build.outputs.test-files }}
      testkit_docker_env: ${{ inputs.testkit_docker_env }}
      build_timeout: ${{ inputs.build_timeout }}
      network: ${{ inputs.network }}
    secrets: inherit
