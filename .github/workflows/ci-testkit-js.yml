name: CI - TestKit.js
env:
  MIDNIGHTCI_PACKAGES_WRITE: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

permissions:
  contents: read
  issues: read
  id-token: write
  packages: write
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      should_run:
        required: true
        type: string
      should_prerelease:
        required: true
        type: string
      yarn_filter:
        type: string
        description: Optional filter to include when running Yarn (i.e., --filter=...)
        required: false
        default: '--filter="./testkit-js/*"'
      yarn_lint_paths:
        type: string
        description: Optional paths to include when running 'yarn lint'' (i.e., ./packages)
        required: false
        default: './testkit-js'
      build_timeout:
        required: false
        type: number
        default: 30
      network:
        type: string
        description: Midnight network to use (testnet/devnet/undeployed)
        required: true
        default: 'undeployed'
      testkit_docker_env:
        type: string
        description: Docker image version set sourced from testkit-js/env/<testkit_docker_env>.env (qanet|preview|preprod|mainnet|devnet). Empty falls back to the .envrc default.
        required: false
        default: ''

concurrency:
  group: TK-JS-${{ github.workflow }}-${{ inputs.testkit_docker_env || 'default' }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: inputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Install direnv
        run: curl -sfL https://direnv.net/install.sh | DIRENV_GITHUB_API_TOKEN=$GITHUB_TOKEN  bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load environment from .envrc
        env:
          TESTKIT_DOCKER_ENV: ${{ inputs.testkit_docker_env }}
        run: |
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
          cache: 'yarn'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Configure yarn
        run: yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Cache Turbo and Yarn dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: |
            **/node_modules
            ~/.yarn
            .turbo
          key: turbo-testkit-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-testkit-${{ runner.os }}-

      - name: Install dependencies
        run: |
          yarn install --immutable

      - name: Run build
        run: yarn build ${{ inputs.yarn_filter }} --cache-dir ./turbo
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run linter
        run: yarn lint -- ${{ inputs.yarn_lint_paths }}

      - name: Run tests
        run: |
          yarn test --filter="./testkit-js/*" --cache-dir ./turbo
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Upload compiled contracts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: e2e-tests-contracts
          path: testkit-js/testkit-js-e2e/src/contract/compiled

      - name: Upload dist for it
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: midnight-js-dist-testkit
          path: packages/*/dist/

      - name: Upload dist for it
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        with:
          name: testkit-dist
          path: testkit-js/*/dist/

  cd-prerelease:
    runs-on: ubuntu-latest
    needs: ci
    if: inputs.should_prerelease == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install direnv
        run: curl -sfL https://direnv.net/install.sh | DIRENV_GITHUB_API_TOKEN=$GITHUB_TOKEN  bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load environment from .envrc
        env:
          TESTKIT_DOCKER_ENV: ${{ inputs.testkit_docker_env }}
        run: |
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
          cache: 'yarn'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Configure yarn & npm
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Cache Turbo and Yarn dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: |
            **/node_modules
            ~/.yarn
            .turbo
          key: turbo-testkit-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-testkit-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Temp bump prerelease
        run: yarn version prerelease

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short ${{ github.sha }})
          currentVersion=$(jq -r .version package.json)
          targetVersion="$currentVersion-pre.$calculatedSha"
          echo "target_version=$targetVersion" >> $GITHUB_OUTPUT

      - name: Bump versions
        run: yarn workspaces foreach -R --from "./testkit-js/*" --exclude "./packages/*" version ${{ steps.vars.outputs.target_version }}

      - name: Publish packages
        run: yarn deploy --filter="./testkit-js/*" --cache-dir ./turbo -- --tag pre
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

  generate-test-matrix:
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      test-files: ${{ steps.generate-matrix.outputs.test-files }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Generate test matrix
        id: generate-matrix
        run: |
          cd testkit-js/testkit-js-e2e/test
          TEST_FILES=$(ls *.test.ts | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "test-files=$TEST_FILES" >> $GITHUB_OUTPUT
          echo "Generated test matrix: $TEST_FILES"

  e2e_tests:
    name: E2E Tests
    runs-on: ubuntu-latest-8-core-x64
    needs: [ci, generate-test-matrix]
    timeout-minutes: ${{ inputs.build_timeout }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        test-file: ${{ fromJson(needs.generate-test-matrix.outputs.test-files) }}
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Install direnv
        run: curl -sfL https://direnv.net/install.sh | DIRENV_GITHUB_API_TOKEN=$GITHUB_TOKEN  bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load environment from .envrc
        env:
          TESTKIT_DOCKER_ENV: ${{ inputs.testkit_docker_env }}
        run: |
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
          cache: 'yarn'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Configure yarn
        run: yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Cache Turbo and Yarn dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: |
            **/node_modules
            ~/.yarn
            .turbo
          key: turbo-testkit-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-testkit-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          name: midnight-js-dist-testkit
          path: packages/

      - name: Download testkit build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          name: testkit-dist
          path: testkit-js/

      - name: Download contracts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          name: e2e-tests-contracts
          path: testkit-js/testkit-js-e2e/src/contract/compiled

      - name: Post-Install dependencies
        run: yarn postinstall

      - name: Run e2e tests - ${{ matrix.test-file }}
        if: ${{ !contains(github.event.head_commit.message, '[skip_it]') }}
        run: yarn e2e-single --filter="./testkit-js/*" --concurrency 1 --cache-dir ./turbo
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          MN_TEST_ENVIRONMENT: ${{ inputs.network }}
          MN_TEST_FILE: ${{ matrix.test-file }}

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: test-results-${{ inputs.testkit_docker_env || 'default' }}-${{ matrix.test-file }}
          path: testkit-js/testkit-js-e2e/reports/

  e2e_tests_reports:
    name: E2E Tests Reports
    runs-on: ubuntu-latest
    needs: e2e_tests
    if: always() && (needs.e2e_tests.result == 'success' || needs.e2e_tests.result == 'failure')
    steps:

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Download Test Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          pattern: test-results-${{ inputs.testkit_docker_env || 'default' }}-*
          path: test-results

      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-results
          find test-results -path '*/allure-results-*/*' -exec cp {} allure-results/ \;
          if [ "$(ls -A allure-results)" ]; then
            npx allure-commandline generate allure-results --clean -o allure-report
          else
            echo "No Allure results found"
          fi

      - name: Upload Allure Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: allure-report-${{ inputs.testkit_docker_env || 'default' }}
          path: allure-report/

      - name: Merge CTRF Results
        if: always()
        run: |
          mkdir ctrf-results
          find test-results -name "ctrf-*.json" -exec cp {} ctrf-results/ \;
          if [ "$(ls -A ctrf-results)" ]; then
            npx ctrf merge ctrf-results --output ./ctrf-report-merged.json
          else
            echo "No CTRF results found"
          fi

      - name: Write per-env step summary
        if: always()
        env:
          TESTKIT_ENV: ${{ inputs.testkit_docker_env || 'default' }}
        run: |
          CTRF_PATH=""
          if [ -f ./ctrf-report-merged.json ]; then
            CTRF_PATH="./ctrf-report-merged.json"
          fi
          {
            echo "### E2E Tests — \`${TESTKIT_ENV}\`"
            echo ""
            ./.github/scripts/render-e2e-summary.sh "${TESTKIT_ENV}" "${CTRF_PATH}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Test Report
        if: always() && github.event_name != 'schedule'
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # ratchet:ctrf-io/github-test-reporter@v1.0.28
        with:
          title: 'E2E Tests Results'
          report-path: 'ctrf-results/ctrf-report-merged.json'
          suite-folded-report: true
          pull-request: true
          pull-request-report: true
          overwrite-comment: true
          collapse-large-reports: true
          comment-tag: '${{ github.workflow }}-${{ github.job }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: test-results-ctrf-summary-${{ inputs.testkit_docker_env || 'default' }}
          path: ctrf-results

      - name: Publish Test Summary Results
        if: always()
        run: |
          mkdir junit-results
          find test-results -name "*.xml" -exec cp {} junit-results/ \;
          if [ "$(ls -A junit-results)" ]; then
            npm install -g junit-report-merger
            jrm junit-test-results.xml junit-results/*.xml
          else
            echo "No JUnit results found"
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: test-results-junit-summary-${{ inputs.testkit_docker_env || 'default' }}
          path: junit-test-results.xml
