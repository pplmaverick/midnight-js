name: CI - TestKit.js (prerelease)
#
# Extracted from ci-testkit-js-build.yml so the wrapper (ci-testkit-js.yml) can
# schedule `prerelease` and `e2e` as siblings of `build` (both `needs: build`).
# If prerelease lived inside the build workflow, `e2e: needs: build` would wait
# for ALL build-workflow jobs including prerelease, removing the parallelism the
# original monolithic workflow had. DO NOT merge this back into build.yml without
# redesigning the wrapper DAG.

env:
  MIDNIGHTCI_PACKAGES_WRITE: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

permissions:
  contents: read
  issues: read
  id-token: write
  packages: write

on:
  workflow_call:
    inputs:
      testkit_docker_env:
        type: string
        description: Docker image version set sourced from testkit-js/env/<testkit_docker_env>.env (qanet|preview|preprod|mainnet|devnet). Empty falls back to the .envrc default (devnet).
        required: false
        default: 'devnet'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Install direnv
        run: curl -sfL https://direnv.net/install.sh | DIRENV_GITHUB_API_TOKEN=$GITHUB_TOKEN  bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load environment from .envrc
        env:
          TESTKIT_DOCKER_ENV: ${{ inputs.testkit_docker_env }}
        run: |
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
          cache: 'yarn'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Configure yarn & npm
        run: |
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Cache Turbo and Yarn dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: |
            **/node_modules
            ~/.yarn
            .turbo
          key: turbo-testkit-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-testkit-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Temp bump prerelease
        run: yarn version prerelease

      - name: Set short git commit SHA
        id: vars
        run: |
          calculatedSha=$(git rev-parse --short ${{ github.sha }})
          currentVersion=$(jq -r .version package.json)
          targetVersion="$currentVersion-pre.$calculatedSha"
          echo "target_version=$targetVersion" >> $GITHUB_OUTPUT

      - name: Bump versions
        run: yarn workspaces foreach -R --from "./testkit-js/*" --exclude "./packages/*" version ${{ steps.vars.outputs.target_version }}

      - name: Publish packages
        run: yarn deploy --filter="./testkit-js/*" --cache-dir ./turbo -- --tag pre
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
