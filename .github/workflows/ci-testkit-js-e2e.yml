name: CI - TestKit.js (e2e)
env:
  MIDNIGHTCI_PACKAGES_WRITE: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

permissions:
  contents: read
  issues: read
  id-token: write
  packages: write
  checks: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      test_files:
        type: string
        description: JSON array of e2e test filenames (output of the build workflow's generate-test-matrix).
        required: true
      testkit_docker_env:
        type: string
        description: Docker image version set sourced from testkit-js/env/<testkit_docker_env>.env (qanet|preview|preprod|mainnet|devnet). Empty falls back to the .envrc default (devnet).
        required: false
        default: 'devnet'
      build_timeout:
        type: number
        required: false
        default: 30
      network:
        type: string
        description: Midnight network to use (testnet/devnet/undeployed)
        required: true
        default: 'undeployed'

concurrency:
  group: TK-JS-e2e-${{ github.workflow }}-${{ inputs.testkit_docker_env || 'default' }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  prepare_images:
    name: Prepare Docker Images
    runs-on: ubuntu-latest
    env:
      TESTKIT_DOCKER_ENV: ${{ inputs.testkit_docker_env }}
    steps:

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Cache Docker images
        id: image-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: image-cache
          key: docker-images-${{ inputs.testkit_docker_env }}-${{ hashFiles(format('testkit-js/env/{0}.env', inputs.testkit_docker_env)) }}

      - name: Log in to GitHub Container registry
        if: steps.image-cache.outputs.cache-hit != 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Pull and save images
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          set -a
          . "testkit-js/env/${TESTKIT_DOCKER_ENV}.env"
          set +a
          mkdir -p image-cache
          docker compose -f testkit-js/compose.yml pull
          docker save \
            "ghcr.io/midnight-ntwrk/proof-server:${PROOF_SERVER_VERSION}" \
            "ghcr.io/midnight-ntwrk/indexer-standalone:${INDEXER_VERSION}" \
            "ghcr.io/midnight-ntwrk/midnight-node:${MIDNIGHT_NODE_VERSION}" \
            | gzip > image-cache/images.tar.gz

  e2e_tests:
    name: E2E Tests
    needs: prepare_images
    runs-on: ubuntu-latest-8-core-x64
    timeout-minutes: ${{ inputs.build_timeout }}
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix:
        test-file: ${{ fromJson(inputs.test_files) }}
    steps:

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Install direnv
        run: curl -sfL https://direnv.net/install.sh | DIRENV_GITHUB_API_TOKEN=$GITHUB_TOKEN  bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load environment from .envrc
        env:
          TESTKIT_DOCKER_ENV: ${{ inputs.testkit_docker_env }}
        run: |
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"

      - name: Log in to GitHub Container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: 'https://ghcr.io'
          username: MidnightCI
          password: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
          cache: 'yarn'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Configure yarn
        run: yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Cache Turbo and Yarn dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: |
            **/node_modules
            ~/.yarn
            .turbo
          key: turbo-testkit-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-testkit-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          name: midnight-js-dist-testkit
          path: packages/

      - name: Download testkit build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          name: testkit-dist
          path: testkit-js/

      - name: Download contracts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          name: e2e-tests-contracts
          path: testkit-js/testkit-js-e2e/src/contract/compiled

      - name: Post-Install dependencies
        run: yarn postinstall

      - name: Restore Docker images
        id: image-cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6.1.0
        with:
          path: image-cache
          key: docker-images-${{ inputs.testkit_docker_env }}-${{ hashFiles(format('testkit-js/env/{0}.env', inputs.testkit_docker_env)) }}

      - name: Load Docker images
        if: steps.image-cache.outputs.cache-hit == 'true'
        run: gunzip -c image-cache/images.tar.gz | docker load

      - name: Run e2e tests - ${{ matrix.test-file }}
        if: ${{ !contains(github.event.head_commit.message, '[skip_it]') }}
        run: yarn e2e-single --filter="./testkit-js/*" --concurrency 1 --cache-dir ./turbo
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          MN_TEST_ENVIRONMENT: ${{ inputs.network }}
          MN_TEST_FILE: ${{ matrix.test-file }}

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: test-results-${{ inputs.testkit_docker_env || 'default' }}-${{ matrix.test-file }}
          path: testkit-js/testkit-js-e2e/reports/

  e2e_tests_reports:
    name: E2E Tests Reports
    runs-on: ubuntu-latest
    needs: e2e_tests
    # Run on success/failure AND cancelled/skipped so reviewers can still see a row
    # indicating why no test results exist (otherwise the absence is silent).
    if: always()
    steps:

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Download Test Results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # ratchet:actions/download-artifact@v8.0.1
        with:
          pattern: test-results-${{ inputs.testkit_docker_env || 'default' }}-*
          path: test-results

      - name: Generate Allure Report
        if: always()
        run: |
          mkdir -p allure-results
          find test-results -path '*/allure-results-*/*' -exec cp {} allure-results/ \;
          if [ "$(ls -A allure-results)" ]; then
            npx allure-commandline generate allure-results --clean -o allure-report
          else
            echo "No Allure results found"
          fi

      - name: Upload Allure Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always() && needs.e2e_tests.result != 'skipped' && needs.e2e_tests.result != 'cancelled'
        with:
          name: allure-report-${{ inputs.testkit_docker_env || 'default' }}
          path: allure-report/
          if-no-files-found: error

      - name: Merge CTRF Results
        if: always()
        run: |
          mkdir ctrf-results
          find test-results -name "ctrf-*.json" -exec cp {} ctrf-results/ \;
          if [ "$(ls -A ctrf-results)" ]; then
            npx ctrf merge ctrf-results --output ./ctrf-report-merged.json
            # `npx ctrf merge` ignores --output and writes the merged file inside the input
            # directory (ctrf-results/ctrf-report-merged.json). Copy it to the workspace root
            # so the per-env summary step's `[ -f ./ctrf-report-merged.json ]` check finds it.
            if [ -f ctrf-results/ctrf-report-merged.json ] && [ ! -f ./ctrf-report-merged.json ]; then
              cp ctrf-results/ctrf-report-merged.json ./ctrf-report-merged.json
            fi
          else
            echo "No CTRF results found"
          fi

      - name: Write per-env step summary
        if: always()
        env:
          TESTKIT_ENV: ${{ inputs.testkit_docker_env || 'default' }}
          E2E_RESULT: ${{ needs.e2e_tests.result }}
        run: |
          set -euo pipefail
          {
            echo "### E2E Tests — \`${TESTKIT_ENV}\`"
            echo ""
            if [ "$E2E_RESULT" = "cancelled" ] || [ "$E2E_RESULT" = "skipped" ]; then
              echo ":rotating_light: E2E tests **${E2E_RESULT}** — no results to render."
            else
              CTRF_PATH=""
              if [ -f ./ctrf-report-merged.json ]; then
                CTRF_PATH="./ctrf-report-merged.json"
              fi
              ./.github/scripts/render-e2e-summary.sh "${TESTKIT_ENV}" "${CTRF_PATH}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Test Report
        if: always() && github.event_name != 'schedule'
        uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700 # ratchet:ctrf-io/github-test-reporter@v1.1.0
        with:
          title: 'E2E Tests Results'
          report-path: 'ctrf-results/ctrf-report-merged.json'
          suite-folded-report: true
          pull-request: true
          pull-request-report: true
          overwrite-comment: true
          collapse-large-reports: true
          comment-tag: '${{ github.workflow }}-${{ github.job }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload CTRF Summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always() && needs.e2e_tests.result != 'skipped' && needs.e2e_tests.result != 'cancelled'
        with:
          name: test-results-ctrf-summary-${{ inputs.testkit_docker_env || 'default' }}
          path: ctrf-results
          if-no-files-found: error

      - name: Publish Test Summary Results
        if: always()
        run: |
          mkdir junit-results
          find test-results -name "*.xml" -exec cp {} junit-results/ \;
          if [ "$(ls -A junit-results)" ]; then
            npm install -g junit-report-merger
            jrm junit-test-results.xml junit-results/*.xml
          else
            echo "No JUnit results found"
          fi

      - name: Upload JUnit Summary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always() && needs.e2e_tests.result != 'skipped' && needs.e2e_tests.result != 'cancelled'
        with:
          name: test-results-junit-summary-${{ inputs.testkit_docker_env || 'default' }}
          path: junit-test-results.xml
          if-no-files-found: error
