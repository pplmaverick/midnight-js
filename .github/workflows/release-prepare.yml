name: Release (prepare PR)
#
# Manually prepares a release: bumps versions across all workspaces, regenerates
# CHANGELOG.md, and opens a release PR. Merging that PR to `main` triggers the
# existing `publish` job in ci.yml. This replaces the need to run
# scripts/release.sh locally; the script remains as a local fallback.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 5.1.0 or 5.1.0-beta.1)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-prepare
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    steps:
      - name: Guard - main only
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::release-prepare can only run from main (got \"$GITHUB_REF\")."
          exit 1

      # fetch-depth: 0 + fetch-tags: true are BOTH required: `yarn changelog`
      # (.versionrc.js has releaseCount: 0) regenerates the whole CHANGELOG from
      # every release tag, so all `v*` tags must be present. checkout does not
      # fetch tags without fetch-tags, even at full depth.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          node-auth-token: ${{ secrets.MIDNIGHTBOT_PACKAGES_WRITE }}

      - name: Install dependencies
        run: yarn install --immutable

      - name: Validate version input
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::Invalid version '$VERSION' (expected semver like 5.1.0 or 5.1.0-beta.1)."
            exit 1
          fi
          echo "Version '$VERSION' is valid."

      # Version bump + changelog, inline with standard tooling (previously
      # scripts/release.sh --files-only). The script remains as a local fallback
      # but CI no longer depends on it.
      - name: Bump versions across workspaces
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Capture the workspace list on its own line: a failure of the yarn
          # call inside a `for ... in $(...)` word-list is NOT caught by
          # `set -e`, which would silently bump only the root and leave the
          # workspaces on their old versions.
          workspaces=$(yarn workspaces list --json)
          npm pkg set version="$VERSION"
          for pkg in $(echo "$workspaces" | jq -r 'select(.location | startswith("packages/")) | .name'); do
            npm pkg set version="$VERSION" -w "$pkg"
          done
          for pkg in $(echo "$workspaces" | jq -r 'select(.location | startswith("testkit-js/")) | .name'); do
            npm pkg set version="$VERSION" -w "$pkg"
          done

      - name: Generate changelog
        run: yarn changelog

      # The commit MUST be created via the GitHub API (not a local `git commit`)
      # so it is signed by GitHub and attributed to the GH_TOKEN owner
      # (MidnightCI, a real account). A local commit is unsigned and authored by
      # a bare noreply email that resolves to no account, which leaves the
      # `license/cla` check permanently "not signed". GH_TOKEN is a PAT (not
      # GITHUB_TOKEN) so the opened PR still triggers CI.
      # The release/* ruleset ALLOWS creating a branch but BLOCKS updating one
      # ("Changes must be made through a pull request"). Creating release/vX and
      # then adding the bump commit fails, because that second step is an update.
      # So mirror scripts/release.sh: build the signed commit on an unprotected
      # staging branch, then create release/vX pointing straight at it - a single
      # creation, which the ruleset permits.
      - name: Stage bump and push unprotected staging branch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Stage so ghcommit-action enumerates individual files rather than a
          # collapsed untracked directory (which it would fail to read).
          git add -A -- package.json CHANGELOG.md packages testkit-js
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          # staging/* is not matched by the release/* ruleset, so it can be
          # committed to and deleted freely. --no-verify skips the husky pre-push
          # hook (lint/typecheck), which needs a full build this job never runs.
          git push --no-verify --force origin "HEAD:refs/heads/staging/release-v${VERSION}"

      - name: Commit bump via GitHub API (signed) onto staging branch
        # planetscale/ghcommit-action commits via GitHub's GraphQL
        # createCommitOnBranch API, so the commit is GitHub-signed (Verified)
        # and attributed to the GH_TOKEN owner (MidnightCI).
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # ratchet:planetscale/ghcommit-action@v0.2.22
        with:
          commit_message: "chore(release): bump version to ${{ inputs.version }}"
          repo: ${{ github.repository }}
          branch: staging/release-v${{ inputs.version }}
          file_pattern: "package.json CHANGELOG.md packages testkit-js"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create release/v<version> at the signed commit and open PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # release/vX is protected - once created it cannot be updated or
          # deleted - so refuse if it already exists (bump a new version).
          if gh api "repos/${REPO}/git/ref/heads/release/v${VERSION}" >/dev/null 2>&1; then
            echo "::error::release/v${VERSION} already exists and is protected. Bump a new version."
            exit 1
          fi
          # The signed commit the action just made on the staging branch.
          sha=$(gh api "repos/${REPO}/git/ref/heads/staging/release-v${VERSION}" --jq '.object.sha')
          # Create release/vX pointing at it (creation is permitted; an update
          # would be rejected by the ruleset).
          gh api -X POST "repos/${REPO}/git/refs" -f ref="refs/heads/release/v${VERSION}" -f sha="${sha}"
          # Best-effort cleanup of the unprotected staging branch.
          gh api -X DELETE "repos/${REPO}/git/refs/heads/staging/release-v${VERSION}" \
            || echo "note: could not delete staging branch (non-fatal)"
          gh pr create --base main --head "release/v${VERSION}" \
            --title "chore(release): bump version to ${VERSION}" \
            --body "Automated release preparation for v${VERSION}.

          - Versions bumped across all workspaces
          - \`CHANGELOG.md\` regenerated

          Merging this PR to \`main\` triggers the \`publish\` job in ci.yml, which publishes the packages and cuts the GitHub Release."
