name: CD - Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  issues: read
  id-token: write
  packages: write
  checks: write
  pull-requests: write

jobs:
  ci-midnightjs:
    name: Run CI for Midnight.js
    uses: ./.github/workflows/ci-midnight-js.yml
    with:
      should_run: true
      should_prerelease: false
    secrets: inherit

  ci-testkitjs:
    name: Run CI for Testkit.js
    uses: ./.github/workflows/ci-testkit-js.yml
    with:
      should_run: true
      should_prerelease: false
      network: undeployed
    secrets: inherit

  cd-release:
    runs-on: ubuntu-latest
    needs: [ci-midnightjs, ci-testkitjs]
    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install direnv
        run: curl -sfL https://direnv.net/install.sh | DIRENV_GITHUB_API_TOKEN=$GITHUB_TOKEN  bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Load environment from .envrc
        run: |
          direnv allow .
          direnv export gha >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # ratchet:actions/setup-node@v6
        with:
          registry-url: https://npm.pkg.github.com/
          scope: '@midnight-ntwrk'
          node-version-file: '.nvmrc'
          cache: 'yarn'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Configure yarn
        run: yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Cache Turbo and Yarn dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            **/node_modules
            ~/.yarn
            .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build:core
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Run tests
        run: yarn test --concurrency 1
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract release notes from CHANGELOG.md for this version
          awk "/^## .*$VERSION/,/^## /{if(/^## .*$VERSION/) found=1; else if(/^## / && found) exit; if(found && !/^## .*$VERSION/) print}" CHANGELOG.md > release_notes.md

          # If no release notes found, use commit messages since last tag
          if [ ! -s release_notes.md ]; then
            echo "### Changes" > release_notes.md
            git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release_notes.md
          fi

      - name: Determine Build Targets
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: changes
        with:
          filters: |
            midnight-js: 'packages/**'
            testkit-js: 'testkit-js/**'

      - name: Validate Packages Before Publishing
        if: steps.changes.outputs.midnight-js == 'true'
        uses: ./.github/actions/validate-packages
        with:
          workspace-path: './packages'

      - name: Publish packages
        if: steps.changes.outputs.midnight-js == 'true'
        run: |
          yarn deploy --filter="./packages/*" --cache-dir ./turbo --concurrency=1
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}

      - name: Create GitHub Release
        if: steps.changes.outputs.midnight-js == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release_notes.outputs.version }}
          release_name: Release ${{ steps.release_notes.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false

      - name: Extract version number
        id: version
        run: |
          # Remove 'v' prefix from tag to get version number
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "number=$VERSION" >> $GITHUB_OUTPUT

      - name: Bump testkit-js versions
        if: steps.changes.outputs.testkit-js == 'true'
        run: yarn workspaces foreach -R --from "./testkit-js/*" --exclude "./packages/*" version ${{ steps.version.outputs.number }}

      - name: Validate testkit-js Packages Before Publishing
        if: steps.changes.outputs.testkit-js == 'true'
        uses: ./.github/actions/validate-packages
        with:
          workspace-path: './testkit-js'

      - name: Publish testkit-js packages
        if: steps.changes.outputs.testkit-js == 'true'
        run: |
          yarn deploy --filter="./testkit-js/*" --cache-dir ./turbo --concurrency=1
        env:
          GITHUB_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          NODE_AUTH_TOKEN: ${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
