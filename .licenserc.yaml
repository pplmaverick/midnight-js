  paths:
    - '**/*.ts'
    - '**/*.js'
    - '**/*.tsx'
    - '**/*.jsx'
    - '**/*.toml'
    - 'Dockerfile*'
    - '**/*.sh'

  paths-ignore:
    - 'dist/**'
    - 'build/**'
    - 'node_modules/**'
    - '**/*.min.js'
    - '**/*.min.css'
    - '.turbo/**'
    - '.yarn/**'
    - 'coverage/**'
    - 'docs/api/**'
    - '**/*.md'
    - 'LICENSE'
    - 'NOTICE'
    - 'yarn.lock'
    - '**/*.json'
    - '**/*.yaml'
    - '**/*.yml'
    - '.gitignore'
    - '.eslintignore'
    - '.prettierignore'
    - '.nvmrc'
    - '.editorconfig'
    - '**/*.d.ts'
    - '**/generated/**'
    - '**/compiled/**'
    - '**/managed/**'
    - '**/auto-generated/**'
    - 'packages/*/src/gen/*.ts'

  comment: on-failure

dependency:
  files:
    - package.json
