services:
  proof-server:
    image: "ghcr.io/midnight-ntwrk/proof-server:${PROOF_SERVER_VERSION}"
    container_name: proof-server_$TESTCONTAINERS_UID
    command: ['midnight-proof-server --verbose']
    ports:
      - '6300'
    environment:
      RUST_BACKTRACE: 'full'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6300/version']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  indexer:
    image: "ghcr.io/midnight-ntwrk/indexer-standalone:${INDEXER_VERSION}"
    container_name: indexer_$TESTCONTAINERS_UID
    ports:
      - '8088'
    environment:
      RUST_LOG: 'indexer=debug,chain_indexer=debug,indexer_api=debug,wallet_indexer=debug,indexer_common=debug,fastrace_opentelemetry=off,info'
      APP__INFRA__NODE__URL: 'ws://node:9944'
      APP__APPLICATION__NETWORK_ID: 'undeployed'
      APP__INFRA__STORAGE__PASSWORD: 'indexer'
      APP__INFRA__PUB_SUB__PASSWORD: 'indexer'
      APP__INFRA__LEDGER_STATE_STORAGE__PASSWORD: 'indexer'
      APP__INFRA__SECRET: '303132333435363738393031323334353637383930313233343536373839303132'
      APP__INFRA__SPO_NODE__BLOCKFROST_ID: 'dummy-not-using-spo'
      # Standalone stack has no SPO node. Indexer 4.3.x spawns spo-indexer
      # unconditionally and exits the whole process when it gives up
      # reconnecting (default 30 × 10s ≈ 5 min). Stretching the delay to 24h
      # keeps the indexer alive for the entire test run without disabling
      # the subtask (no flag exists to opt out).
      APP__INFRA__SPO_NODE__RECONNECT_MAX_DELAY: '24h'

    healthcheck:
      test: ['CMD-SHELL', 'cat /var/run/indexer-standalone/running']
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      node:
        condition: service_healthy

  node:
    image: "ghcr.io/midnight-ntwrk/midnight-node:${MIDNIGHT_NODE_VERSION}"
    container_name: node_$TESTCONTAINERS_UID
    ports:
      - '9944'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9944/health']
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 20s
    environment:
      CFG_PRESET: 'dev'
      SIDECHAIN_BLOCK_BENEFICIARY: '04bcf7ad3be7a5c790460be82a713af570f22e0f801f6659ab8e84a52be6969e'
